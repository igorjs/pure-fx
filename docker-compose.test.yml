services:
  # ── Node (official images) ──────────────────────────────────────────────
  node-22:
    build: { context: ., dockerfile: docker/node.Dockerfile, args: { NODE_VERSION: "22" } }
  node-24:
    build: { context: ., dockerfile: docker/node.Dockerfile, args: { NODE_VERSION: "24" } }
  node-25:
    build: { context: ., dockerfile: docker/node.Dockerfile, args: { NODE_VERSION: "25" } }
  node-alpine:
    build: { context: ., dockerfile: docker/node.Dockerfile, args: { NODE_VERSION: "24", VARIANT: alpine } }

  # ── Deno (official images) ───────────────────────────────────────────────
  deno-debian:
    build: { context: ., dockerfile: docker/deno.Dockerfile, args: { VARIANT: debian } }
    entrypoint: ["sh", "-c", "deno run --allow-all tests/smoke-platform.mjs && deno run --allow-all tests/smoke-core.mjs"]
  deno-alpine:
    build: { context: ., dockerfile: docker/deno.Dockerfile, args: { VARIANT: alpine } }
    entrypoint: ["sh", "-c", "deno run --allow-all tests/smoke-platform.mjs && deno run --allow-all tests/smoke-core.mjs"]

  # ── Bun (official images) ───────────────────────────────────────────────
  bun-debian:
    build: { context: ., dockerfile: docker/bun.Dockerfile, args: { VARIANT: debian } }

  # ── Distroless (production runtime) ──────────────────────────────────────
  distroless:
    build: { context: ., dockerfile: docker/distroless.Dockerfile }

  # ── Browser + Workers (Debian only) ─────────────────────────────────────
  browser:
    build: { context: ., dockerfile: docker/browser.Dockerfile }
  workers:
    build: { context: ., dockerfile: docker/workers.Dockerfile }
